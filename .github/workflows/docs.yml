name: Deploy docs
on:
  push:
    branches: [master]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'requirements.txt'
      - '.github/workflows/docs.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check ASCII-only
        run: |
          if grep -rP '[\x80-\xFF]' docs/ mkdocs.yml .github/workflows/docs.yml; then
            echo "ERROR: Non-ASCII characters found"
            exit 1
          fi
      - name: Check no prose separators
        run: |
          HITS=$(grep -rn ' -- ' docs/ | grep -v '^\s*```' | grep -v '`[^`]*--[^`]*`' | grep -v '\-\-[a-z]' || true)
          if [ -n "$HITS" ]; then
            echo "$HITS"
            echo "ERROR: Possible prose separators found (review above)"
            exit 1
          fi

  build:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt && pip install linkchecker
      - run: mkdocs build --strict
      - name: Check internal links
        run: linkchecker site/ --check-extern=false --no-warnings
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
