name: Lint & Verify

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: ShellCheck setup.sh
        run: shellcheck setup.sh

      - name: ShellCheck sections/
        run: shellcheck sections/*.sh

  syntax-and-dryrun:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Syntax check
        run: |
          bash -n setup.sh
          for f in sections/*.sh; do
            bash -n "$f" || exit 1
          done

      - name: Dry-run smoke test
        run: ./setup.sh --dry-run --only packages fonts tmux zsh vim python

  bats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bats-core
        run: sudo apt-get install -y bats

      - name: Run unit tests
        run: bats tests/
