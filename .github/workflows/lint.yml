name: Lint & Verify

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: ShellCheck setup.sh
        run: shellcheck setup.sh

      - name: ShellCheck sections/
        run: shellcheck sections/*.sh

  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Syntax check
        run: |
          bash -n setup.sh
          for f in sections/*.sh; do
            bash -n "$f" || exit 1
          done

      - name: Verify mode (default sections)
        run: ./setup.sh --verify --skip wsl keyd auto_cpufreq ddcutil
